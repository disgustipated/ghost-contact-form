<script>
document.addEventListener('DOMContentLoaded', () => {
    const hasform = document.querySelector('form');
    
    if (hasform) {
      const validateScript = document.createElement('script');
      validateScript.src = "/formhandler/assets/js/validate.min.js";
      validateScript.type = "text/javascript";
      document.head.appendChild(validateScript);
      
      const processorScript = document.createElement('script');
      processorScript.src = "/formhandler/assets/js/formProcessor.js";
      processorScript.type = "text/javascript";
      
      let processorLoaded = false;

      processorScript.onload = () => {
        processorLoaded = true;
      };
      
      processorScript.onerror = () => {
        showErrorFormError();
      };
      
      document.head.appendChild(processorScript);
      
      const enableForm = () => {
        if (!processorLoaded) {
          showErrorFormError();
        } else {
          hasform.disabled = false;
        }
      };
      setTimeout(enableForm, 500);
      hasform.addEventListener('input', enableForm);
      function showErrorFormError() {
        const errorDiv = document.createElement('div');
        errorDiv.textContent = '⚠️ There was an error loading the form, please call to contact instead';
        errorDiv.style.color = 'red';
        errorDiv.style.marginTop = '10px';
        hasform.insertBefore(errorDiv, hasform.firstChild);
        document.querySelector('.g-auth-form-container__normal').style.display = 'none';
      }
    }
  });
</script>
